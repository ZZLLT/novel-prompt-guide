# 润色修改 - 提示词模板

system_prompt: |
  你是一位专业的网文编辑，擅长润色文字、检查逻辑、提升可读性。
  请在保持作者原意和风格的基础上，进行专业的修改和提升。
  修改原则：
  1. 保持原文风格和语调，不做颠覆性改写
  2. 优先修复明显问题（逻辑矛盾、语句不通、前后不一致）
  3. 提升表达但不炫技
  4. 网文读者喜欢简洁有力的表达，不要过分文艺化

questions:
  - id: consistency
    label: "🔍 设定一致性检查"
    text: |
      请检查以下章节/段落是否存在设定不一致的问题：

      【检查项】
      1. 人物能力设定是否前后矛盾？
         - 主角之前的能力等级和现在是否一致？
         - 是否有"战力崩坏"的迹象？
      2. 世界观设定是否前后冲突？
         - 之前的设定和现在的描写是否矛盾？
         - 时间线是否合理？
      3. 人物性格是否统一？
         - 人物的行为和之前的性格设定是否匹配？
         - 如果不是，是否给出了合理的转变原因？
      4. 情节逻辑是否有漏洞？
         - 事件的因果链条是否完整？
         - 有没有"强行推进"的感觉？

      请列出发现的所有问题，并给出修改建议。

      【要检查的内容】
      {content}

  - id: style_polish
    label: "✨ 文笔润色"
    text: |
      请对以下内容进行文笔润色：

      【润色方向】（可选择以下一项或多项）
      - 提升画面感：让描写更加生动，读者能"看到"场景
      - 优化节奏：调整句子长短节奏，增加阅读流畅感
      - 强化情感：让情感表达更有感染力
      - 精简冗余：删除废话和重复表达
      - 增加张力：让冲突和矛盾更加突出
      - 对话优化：让对话更自然，更符合人物性格

      【润色要求】
      - 保持原文的基本情节和信息不变
      - 尽量不改变字数（除非要求精简）
      - 标注出主要修改的地方

      【要润色的内容】
      {content}

  - id: hook_check
    label: "🎣 钩子与爽点检查"
    text: |
      请检查以下章节的钩子和爽点设置：

      【检查项】
      1. 章节开头的吸引力
         - 第一段是否能抓住读者？
         - 如果没有，建议如何改写？

      2. 章节结尾的钩子
         - 结尾有没有让读者想看下去的欲望？
         - 如果没有，建议添加什么样的钩子？

      3. 本章爽点
         - 本章有没有爽点？爽点在哪里？
         - 爽点的铺垫是否充分？
         - 爽点的释放是否到位？

      4. 节奏问题
         - 是否有"水字数"的段落？
         - 是否有节奏拖沓的地方？
         - 建议如何调整？

      【要检查的内容】
      {content}

  - id: dialogue_review
    label: "💬 对话专项优化"
    text: |
      请优化以下内容的对话部分：

      【优化方向】
      1. 每句对话是否符合说话人的性格？
      2. 对话是否推动了剧情或展示了关系？
      3. 有没有"为了对话而对话"的废话？
      4. 对话的节奏和信息密度是否合适？
      5. 对话中的潜台词是否丰富？
      6. 有没有出现"所有人都用同一种方式说话"的问题？

      【要优化的内容】
      {content}

  - id: pacing_analysis
    label: "📈 节奏分析报告"
    text: |
      请对以下连续章节进行节奏分析：

      【分析维度】
      1. 整体情绪曲线
         - 画出这几章的情绪起伏（文字描述）
         - 高潮和低谷的分布是否合理？

      2. 信息密度
         - 每章的信息量是否合适？
         - 有没有章节"太水"或"太干"？

      3. 情节推进速度
         - 剧情是否在稳步推进？
         - 有没有停滞不前的感觉？

      4. 读者体验模拟
         - 站在读者角度，阅读这几章的感受是什么？
         - 哪里可能让读者想弃书？
         - 哪里是读者最期待的部分？

      5. 改进建议
         - 具体的章节调整建议
         - 哪几章可以合并或拆分？

      【要分析的内容】
      {content}

compile_prompt: |
  请将以上所有修改建议整合成一份【编辑修改报告】，
  包含：
  1. 整体评估（3-5句话）
  2. 问题清单（按严重程度排序）
  3. 具体修改方案
  4. 修改后的优先级建议

  小说名称：《{title}》

  以下是各部分检查结果：

  {editing_data}
