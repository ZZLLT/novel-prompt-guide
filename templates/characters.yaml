# 人物设计 - 提示词模板

system_prompt: |
  你是一位专业的网文角色设计师，擅长塑造有血有肉、令读者印象深刻的人物。
  请根据用户提供的信息和已有世界观，设计立体的角色。
  回复要求：
  1. 每个角色需要包含：基本信息、外貌、性格、背景故事、能力、人际关系、成长弧线
  2. 角色要有优点也有缺陷，避免脸谱化
  3. 角色之间的关系要有机且能推动剧情
  4. 用中文回复

questions:
  - id: protagonist
    label: "⭐ 主角设计"
    text: |
      请设计小说的主角，包含以下维度：

      【基本信息】
      - 姓名及含义
      - 年龄
      - 性别

      【外貌特征】
      - 身高体型
      - 容貌特点（2-3个标志性特征）
      - 日常穿着风格
      - 战斗/特殊状态下的外貌变化（如果有）

      【身份背景】
      - 出身家庭和社会背景
      - 成长经历中的3个关键事件
      - 当前的公开身份和隐藏身份

      【性格特质】
      - 核心性格（选1-2个关键词，如：冷静腹黑、热血善良、慵懒强大）
      - 3个优点 + 具体表现
      - 2个缺陷 + 如何影响剧情
      - 行为习惯和小癖好（2-3个）
      - 口头禅或标志性台词

      【核心理念】
      - 主角的价值观和底线是什么？
      - 在什么情况下会打破底线？
      - 对力量/权力/财富/感情的态度

      【能力体系】
      - 核心能力/金手指的详细说明
      - 能力的限制和代价
      - 当前实力等级和成长路径
      - 战斗风格（正面强攻/刺客暗杀/远程法师/召唤师/辅助...）

      【情感与人际】
      - 对重要人物的态度和感情
      - 感情线的走向（单女主/多女主/无CP/耽美）
      - 交友原则

      【成长弧线】
      - 开篇时的状态
      - 中期的发展方向
      - 结局时的理想状态
      - 核心成长主题（比如：从懦弱到勇敢、从自私到担当）

  - id: female_lead
    label: "🌸 女主角/重要女性角色"
    text: |
      请设计女主角（或最重要的女性角色），包含以下维度：

      【基本信息】姓名、年龄、外貌特征
      【身份背景】出身、社会地位、特殊身份
      【性格特质】核心性格、优点、缺陷、小习惯
      【能力体系】战斗能力或特殊才能
      【与主角关系】如何认识、关系发展阶段、核心矛盾或羁绊
      【角色弧线】她在故事中的成长和变化

      如果有多个重要女性角色，请每个单独列出。

  - id: antagonist
    label: "💀 反派/对手设计"
    text: |
      请设计小说的主要反派/对手，包含以下维度：

      【主要反派】
      - 姓名、年龄、外貌
      - 身份背景和势力
      - 核心理念和动机（为什么成为反派？他的逻辑是什么？）
      - 能力和实力等级
      - 与主角的冲突根源
      - 反派的魅力和可理解之处（反派不是纯粹的恶）

      【次要对手】（阶段性的敌人或竞争对手）
      - 至少2个，说明他们的定位和与主角的关系

      【反派集团/组织】
      - 如果有反派组织，说明其结构和目的

  - id: supporting
    label: "🤝 配角群像"
    text: |
      请设计小说的配角阵容，至少包含以下角色类型：

      【导师/前辈类】（1-2人）
      教主角本领或给主角指引的人

      【伙伴/战友类】（2-3人）
      与主角并肩作战的伙伴，每人要有鲜明特点

      【情报/后勤类】（1人）
      提供情报、装备或后勤支持的角色

      【搞笑担当】（1人）
      调节气氛的角色（非常重要！网文读者喜欢有笑点的配角）

      【亦敌亦友】（1人）
      与主角既有竞争又有合作的角色

      每个配角请说明：
      姓名、定位、核心特点（一句话概括）、与主角的关系、在剧情中的作用

  - id: relationships
    label: "🕸️ 人物关系网"
    text: |
      请整理以上所有人物之间的关系网络：

      【关系图谱】
      以主角为中心，画出人物关系图（文字描述即可）
      标注：
      - 亲密程度（用1-10表示）
      - 信任程度（用1-10表示）
      - 关系性质（亲情/友情/爱情/利益/敌对/利用）

      【潜在冲突】
      列出3-5个可能发生的人物间冲突点

      【命运交织】
      哪些人物之间存在不为人知的联系？
      哪些人物会在后期揭示出意想不到的关系？

compile_prompt: |
  请将以上所有人物设定整合成一份完整的【人物设定档案】，
  格式要求：
  - 主角单独一节，详细展开
  - 重要配角每人一段，控制在200字内
  - 所有人物按重要性排序
  - 最后附"人物关系速查表"

  小说名称：《{title}》
  类型：{genre}

  以下是各人物设定：

  {char_data}
