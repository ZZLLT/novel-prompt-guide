# 剧情大纲 - 提示词模板

system_prompt: |
  你是一位专业的网文剧情策划师，擅长设计扣人心弦的故事结构和节奏控制。
  请根据用户提供的信息和已有设定，设计完整的故事大纲。
  回复要求：
  1. 结构层次分明：主线→分卷→章节概要
  2. 每卷要有明确的目标和冲突
  3. 关键节点要清楚标注（转折、高潮、伏笔回收）
  4. 节奏控制合理，爽点和爆点分布均匀
  5. 用中文回复

questions:
  - id: mainline
    label: "🎯 主线剧情"
    text: |
      请设计小说的主线剧情：

      【一句话概括】用一句话概括整个故事的核心理念
      格式：这是一个关于______的故事，主角______，最终______。

      【故事问题】故事要回答的核心问题是什么？
      比如：主角能否复仇成功？世界能否被拯救？

      【三幕结构】
      - 第一幕（开局）：故事如何开始？主角的初始状态和触发事件
      - 第二幕（对抗）：主角面临的主要挑战和成长历程
      - 第三幕（结局）：故事的高潮和最终解决

      【核心冲突层级】
      - 外在冲突：主角与外部世界/敌人的冲突
      - 内在冲突：主角内心的矛盾与成长
      - 人际冲突：主角与身边人物的矛盾

      【主题与价值观】
      这个故事想传达什么？不是简单的正邪对立，而是什么深层命题？

  - id: volumes
    label: "📚 分卷规划"
    text: |
      请规划小说的分卷结构（建议3-8卷），每卷包含：

      【卷名】给每一卷起一个吸引人的卷名
      【卷目标】这一卷要讲什么？主角在这一卷的核心目标
      【主要冲突】这一卷的主线冲突是什么
      【关键事件】这一卷中最重要的3-5个事件
      【结尾钩子】这一卷如何收尾？如何让读者想看下一卷？
      【预估字数】这一卷大概多少字？（网文一般一卷15-30万字）
      【爽点分布】这一卷的高潮点在哪里？

      请按照故事发展的顺序，逐卷展开。

  - id: hooks
    label: "🪝 爽点与钩子设计"
    text: |
      请设计小说的爽点和钩子系统：

      【开局钩子】前3章如何抓住读者？
      - 第一章的悬念是什么？
      - 为什么读者会想继续看下去？
      - 开局是否有什么"名场面"？

      【爽点类型分布】
      列出小说中会使用的爽点类型，并说明在哪些位置出现：
      - 打脸逆袭型（比如：被看不起后展现实力）
      - 扮猪吃虎型（比如：隐藏实力后一招制敌）
      - 获得机缘型（比如：意外获得强大能力/宝物）
      - 身份揭露型（比如：隐藏身份被揭开的震撼）
      - 以弱胜强型（比如：用智慧或特殊手段击败强敌）
      - 其他类型...

      【每章钩子策略】
      如何在每章末尾制造悬念？（至少给出5种具体策略）

      【重大反转点】
      故事中有哪些让读者意想不到的剧情反转？

  - id: subplots
    label: "🔀 支线与伏笔"
    text: |
      请设计小说的支线剧情和伏笔系统：

      【支线剧情】（至少3条）
      每条支线说明：
      - 支线主题
      - 涉及人物
      - 与主线的关系（如何交织、如何服务主线）
      - 大致篇幅

      【伏笔系统】
      列出至少5个关键伏笔：
      - 伏笔内容
      - 在哪里埋下（大致章节）
      - 在哪里揭开（大致章节）
      - 揭开时的影响力

      【世界观探索线】
      读者如何逐步了解这个世界？信息释放的节奏是怎样的？

  - id: pacing
    label: "📊 节奏控制蓝图"
    text: |
      请绘制整部小说的节奏控制蓝图：

      【情绪曲线】
      画出故事的情绪起伏（文字描述即可）：
      - 哪里是紧张的高潮？
      - 哪里是舒缓的日常？
      - 高潮与日常如何交替？

      【节奏策略】
      - 多少章一个小高潮？
      - 多少章一个大高潮？
      - 战斗章节和日常章节的比例？
      - 独白/思考章节的分布？

      【信息释放节奏】
      - 世界观信息如何分阶段释放？
      - 角色背景如何逐步揭示？
      - 伏笔如何收放？

compile_prompt: |
  请将以上所有剧情规划整合成一份完整的【剧情大纲】，
  格式要求：
  - 先写主线概述（500字以内）
  - 然后分卷展开，每卷有明确的标题和内容
  - 章节规划精确到每10章的关键节点
  - 最后附「伏笔追踪表」和「角色出场规划表」

  小说名称：《{title}》
  类型：{genre}

  以下是各部分的剧情规划：

  {plot_data}
