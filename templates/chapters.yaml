# 章节写作 - 提示词模板

system_prompt: |
  你是一位专业的网络小说写手，擅长创作吸引人的网文章节。
  请根据提供的设定和大纲，撰写指定章节的内容。
  写作要求：
  1. 语言流畅自然，符合网文阅读习惯
  2. 每章字数：2000-4000字
  3. 章节开头要有吸引力，结尾要有钩子
  4. 对话生动，动作描写有画面感
  5. 适当使用网文常见的修辞手法
  6. 保持与前后章节的连贯性

questions:
  - id: outline_chapter
    label: "📝 按大纲写章节"
    text: |
      请根据以下章节大纲撰写内容：

      【章节信息】
      - 章节标题：
      - 章节编号：第X卷 第X章
      - 预估字数：

      【本章大纲】
      （请填写本章的具体大纲内容）

      【本章目标】
      这一章要实现什么目的？
      比如：引入新角色、展示主角新能力、推进感情线、设置悬疑...

      【关键场景】
      本章最重要的1-2个场景是什么？

      【与前章衔接】
      承接上一章的哪个情节？

      【本章结尾钩子】
      结尾用什么方式让读者想看下一章？
      比如：突然出现的强敌、意想不到的转折、重要信息的揭示...

  - id: continue_chapter
    label: "🔗 续写章节"
    text: |
      请根据以下信息，续写后续章节：

      【前情提要】
      （请粘贴前一章或前几章的摘要/结尾）

      【续写方向】
      接下来应该发生什么？（参考剧情大纲）

      【需要包含的要素】
      - 必须出现的角色：
      - 必须推进的情节：
      - 需要埋下的伏笔：
      - 需要展示的能力/设定：

      【字数要求】
      本章约_____字

  - id: scene_chapter
    label: "🎬 特定场景写作"
    text: |
      请撰写以下特定场景：

      【场景名称】

      【场景类型】（选择一种）
      - 战斗场景：需要有策略、有层次、有爆点
      - 对话场景：需要体现人物性格，推动剧情或展示关系
      - 日常场景：需要有生活气息，展示人物另一面
      - 修炼/升级场景：需要详细的过程描写和突破的关键点
      - 感情场景：需要有细腻的心理描写和情感递进
      - 悬疑场景：需要有紧张的氛围和信息的逐步释放
      - 装逼打脸场景：需要有铺垫、反转、震撼效果

      【场景描述】
      这个场景发生了什么？

      【参与角色】
      场景中出现哪些角色？各自的立场和目的？

      【情感基调】
      紧张/轻松/热血/悲伤/甜蜜/惊悚...

      【字数要求】
      约_____字

  - id: batch_chapters
    label: "📦 批量生成章节大纲"
    text: |
      请为接下来的10章生成详细的章节大纲。
      每章大纲包含：

      1. 章节标题（要吸引人）
      2. 一句话概括本章内容
      3. 本章的核心冲突/看点
      4. 主要出场角色
      5. 章节结尾钩子
      6. 本章埋下的伏笔（如果有）
      7. 情感走向（上升/下降/转折）

      请确保每章之间有清晰的逻辑递进。
      当前进度：已完成第____章，下一章是第____章。

compile_prompt: |
  请将以下所有章节整合成一份完整的【章节内容文档】，
  按章节顺序排列，每章之间用分页符分隔。

  小说名称：《{title}》
  类型：{genre}

  章节内容：

  {chapters_data}
